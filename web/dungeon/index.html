<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Locked In - Dungeon</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #050508; }
    #renderCanvas {
      width: 100%;
      height: 100%;
      display: block;
      touch-action: none;
      outline: none;
    }


    /* ── Dev Panel ── */
    #devPanel {
      position: fixed;
      top: 10px;
      right: 10px;
      z-index: 200;
      background: rgba(0,0,0,0.85);
      color: #ccc;
      font-family: monospace;
      font-size: 12px;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #333;
      width: 240px;
      max-height: 90vh;
      overflow-y: auto;
      display: none;
    }
    #devPanel.visible { display: block; }
    #devPanel h3 {
      color: #0f0;
      font-size: 12px;
      margin: 10px 0 6px;
      border-bottom: 1px solid #333;
      padding-bottom: 4px;
    }
    #devPanel h3:first-child { margin-top: 0; }
    #devPanel button {
      background: #222;
      color: #ccc;
      border: 1px solid #444;
      border-radius: 4px;
      padding: 4px 8px;
      cursor: pointer;
      font-family: monospace;
      font-size: 11px;
      margin: 2px;
    }
    #devPanel button:hover { background: #333; }
    #devPanel button.active { background: #4a0; color: #fff; border-color: #6c0; }
    #devPanel .dev-row {
      display: flex;
      align-items: center;
      gap: 6px;
      margin: 4px 0;
    }
    #devPanel .dev-row label { color: #888; min-width: 50px; }
    #devPanel input[type="range"] { flex: 1; }
    #devPanel .tri-list { margin: 4px 0; line-height: 1.6; }
    #devPanel .tri-list span { color: #0f0; }
    #devToggle {
      position: fixed;
      top: 10px;
      right: 10px;
      z-index: 201;
      background: rgba(0,0,0,0.7);
      color: #0f0;
      border: 1px solid #333;
      border-radius: 4px;
      padding: 4px 8px;
      cursor: pointer;
      font-family: monospace;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <canvas id="renderCanvas"></canvas>

  <!-- Performance stats -->
  <div id="statsOverlay" style="
    position: fixed; top: 10px; left: 10px; z-index: 50;
    background: rgba(0,0,0,0.7); color: #0f0;
    font-family: monospace; font-size: 13px; line-height: 1.5;
    padding: 8px 12px; border-radius: 8px;
    pointer-events: none;
  ">loading...</div>

  <!-- Dev toggle button -->
  <button id="devToggle">DEV</button>

  <!-- Dev panel -->
  <div id="devPanel">
    <h3>Lighting</h3>
    <div class="dev-row">
      <button id="devAllLights">All: ON</button>
      <button id="devSunToggle">Sun: OFF</button>
      <button id="devOrbToggle">Orb: OFF</button>
      <button id="devOrbColor">Color: amber</button>
    </div>
    <div class="dev-row">
      <button id="devCandles">Candles: ON</button>
      <button id="devChandelier">Chandelier: ON</button>
      <button id="devLamps">Lamps: ON</button>
      <button id="devPotion">Potion: ON</button>
    </div>
    <div class="dev-row">
      <label>Bright</label>
      <input type="range" id="devLightSlider" min="0" max="3" step="0.1" value="1">
      <span id="devLightVal">1.0</span>
    </div>

    <h3>Camera</h3>
    <div class="dev-row">
      <button id="devCamLock">Cam: FREE</button>
      <button id="devCamLog">Log Pos</button>
    </div>

    <h3>Gizmo</h3>
    <div class="dev-row">
      <button id="devGizmoPos" class="active">Pos</button>
      <button id="devGizmoRot">Rot</button>
      <button id="devGizmoScale">Scale</button>
      <button id="devGizmoNone">None</button>
    </div>
    <div id="devTransform" style="margin-top:6px;">
      <div class="dev-row"><label>PosX</label><input type="number" id="devPX" step="0.1" style="width:70px;background:#111;color:#ccc;border:1px solid #333;padding:2px 4px;font-family:monospace;font-size:11px;"></div>
      <div class="dev-row"><label>PosY</label><input type="number" id="devPY" step="0.1" style="width:70px;background:#111;color:#ccc;border:1px solid #333;padding:2px 4px;font-family:monospace;font-size:11px;"></div>
      <div class="dev-row"><label>PosZ</label><input type="number" id="devPZ" step="0.1" style="width:70px;background:#111;color:#ccc;border:1px solid #333;padding:2px 4px;font-family:monospace;font-size:11px;"></div>
      <div class="dev-row"><label>RotX</label><input type="number" id="devRX" step="0.01" style="width:70px;background:#111;color:#ccc;border:1px solid #333;padding:2px 4px;font-family:monospace;font-size:11px;"></div>
      <div class="dev-row"><label>RotY</label><input type="number" id="devRY" step="0.01" style="width:70px;background:#111;color:#ccc;border:1px solid #333;padding:2px 4px;font-family:monospace;font-size:11px;"></div>
      <div class="dev-row"><label>RotZ</label><input type="number" id="devRZ" step="0.01" style="width:70px;background:#111;color:#ccc;border:1px solid #333;padding:2px 4px;font-family:monospace;font-size:11px;"></div>
      <div class="dev-row"><label>ScaleX</label><input type="number" id="devSX" step="0.01" style="width:70px;background:#111;color:#ccc;border:1px solid #333;padding:2px 4px;font-family:monospace;font-size:11px;"></div>
      <div class="dev-row"><label>ScaleY</label><input type="number" id="devSY" step="0.01" style="width:70px;background:#111;color:#ccc;border:1px solid #333;padding:2px 4px;font-family:monospace;font-size:11px;"></div>
      <div class="dev-row"><label>ScaleZ</label><input type="number" id="devSZ" step="0.01" style="width:70px;background:#111;color:#ccc;border:1px solid #333;padding:2px 4px;font-family:monospace;font-size:11px;"></div>
    </div>

    <h3>Model Stats (triangles)</h3>
    <div id="devTriList" class="tri-list">Loading...</div>
  </div>


  <script type="module" src="/src/main.ts"></script>
</body>
</html>
