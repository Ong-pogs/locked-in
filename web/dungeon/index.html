<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Locked In - Dungeon</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #050508; }
    #renderCanvas {
      width: 100%;
      height: 100%;
      display: block;
      touch-action: none;
      outline: none;
    }
    .dev-panel {
      background: rgba(0,0,0,0.8);
      padding: 10px 12px; border-radius: 8px;
      display: flex; flex-direction: column; gap: 6px;
    }
    .dev-panel-header {
      color: #888; font-family: monospace; font-size: 11px;
      text-transform: uppercase; letter-spacing: 0.5px;
      cursor: pointer; user-select: none;
      display: flex; justify-content: space-between; align-items: center;
    }
    .dev-panel-header::after {
      content: '▾'; font-size: 10px; color: #555;
    }
    .dev-panel.collapsed .dev-panel-header::after {
      content: '▸';
    }
    .dev-panel.collapsed .dev-panel-body {
      display: none;
    }
    .dev-panel-body {
      display: flex; flex-direction: column; gap: 6px;
    }
    /* Navigation buttons */
    .nav-arrow {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      z-index: 60;
      background: rgba(10, 10, 12, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: rgba(255, 255, 255, 0.7);
      font-family: monospace;
      font-size: 22px;
      width: 44px;
      height: 64px;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, opacity 0.3s;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .nav-arrow:active {
      background: rgba(124, 58, 237, 0.4);
    }
    .nav-arrow.hidden {
      opacity: 0;
      pointer-events: none;
    }
    #arrowLeft { left: 10px; }
    #arrowRight { right: 10px; }

    #backBtn {
      position: fixed;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 60;
      background: rgba(10, 10, 12, 0.7);
      border: 1px solid rgba(255, 255, 255, 0.15);
      color: rgba(255, 255, 255, 0.8);
      font-family: monospace;
      font-size: 13px;
      padding: 8px 20px;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s, opacity 0.3s;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      opacity: 0;
      pointer-events: none;
    }
    #backBtn:active {
      background: rgba(124, 58, 237, 0.4);
    }
    #backBtn.visible {
      opacity: 1;
      pointer-events: auto;
    }
  </style>
</head>
<body>
  <canvas id="renderCanvas"></canvas>

  <!-- Camera navigation -->
  <button id="arrowLeft" class="nav-arrow" aria-label="Previous viewpoint">&#x2039;</button>
  <button id="arrowRight" class="nav-arrow" aria-label="Next viewpoint">&#x203a;</button>
  <button id="backBtn" aria-label="Back">&#x2190; Back</button>

  <!-- Performance stats -->
  <div id="statsOverlay" style="
    position: fixed; top: 10px; left: 10px; z-index: 50;
    background: rgba(0,0,0,0.7); color: #0f0;
    font-family: monospace; font-size: 13px; line-height: 1.5;
    padding: 8px 12px; border-radius: 8px;
    pointer-events: none;
  ">loading...</div>

  <!-- Book popup overlay (shown when tapping the book in standalone web mode) -->
  <div id="bookOverlay" style="
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.75);
    z-index: 100;
    justify-content: flex-end;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  ">
    <div id="bookPanel" style="
      background: #141416;
      border-top: 1px solid #2a2a2e;
      border-radius: 24px 24px 0 0;
      padding: 28px 24px 40px;
      max-height: 80vh;
      overflow-y: auto;
    ">
      <h2 style="color:#fff; font-size:22px; margin:0;">Solana Fundamentals</h2>
      <p style="color:#888; font-size:14px; margin:6px 0 0; line-height:1.5;">
        Learn the core concepts of the Solana blockchain — accounts, transactions, programs, and the runtime.
      </p>

      <!-- Progress -->
      <div style="background:#1c1c1e; border:1px solid #2a2a2e; border-radius:14px; padding:16px; margin-top:16px;">
        <span style="color:#999; font-size:12px; font-weight:600; text-transform:uppercase; letter-spacing:0.5px;">Progress</span>
        <div style="height:6px; background:#2a2a2e; border-radius:3px; margin-top:10px; overflow:hidden;">
          <div style="height:100%; width:0%; background:#f59e0b; border-radius:3px;"></div>
        </div>
        <span style="color:#666; font-size:13px; margin-top:4px; display:block;">0/5 lessons</span>
      </div>

      <!-- Last learned -->
      <div style="background:#1c1c1e; border:1px solid #2a2a2e; border-radius:14px; padding:16px; margin-top:16px;">
        <span style="color:#999; font-size:12px; font-weight:600; text-transform:uppercase; letter-spacing:0.5px;">Last Learned</span>
        <span style="color:#666; font-size:13px; margin-top:4px; display:block;">No lessons completed yet</span>
      </div>

      <!-- Action grid -->
      <div style="display:flex; gap:10px; margin-top:20px;">
        <button style="flex:1; background:#1c1c1e; border:1px solid #2a2a2e; border-radius:14px; padding:14px 0; text-align:center; cursor:pointer;">
          <div style="font-size:20px;">🏋️</div>
          <div style="color:#999; font-size:11px; margin-top:6px; font-weight:500;">Practice</div>
        </button>
        <button style="flex:1; background:#1c1c1e; border:1px solid #2a2a2e; border-radius:14px; padding:14px 0; text-align:center; cursor:pointer;">
          <div style="font-size:20px;">🧩</div>
          <div style="color:#999; font-size:11px; margin-top:6px; font-weight:500;">Puzzle</div>
        </button>
        <button style="flex:1; background:#1c1c1e; border:1px solid #2a2a2e; border-radius:14px; padding:14px 0; text-align:center; cursor:pointer;">
          <div style="font-size:20px;">📖</div>
          <div style="color:#999; font-size:11px; margin-top:6px; font-weight:500;">Dictionary</div>
        </button>
        <button style="flex:1; background:#1c1c1e; border:1px solid #2a2a2e; border-radius:14px; padding:14px 0; text-align:center; cursor:pointer;">
          <div style="font-size:20px;">📚</div>
          <div style="color:#999; font-size:11px; margin-top:6px; font-weight:500;">All Courses</div>
        </button>
      </div>

      <!-- Start lesson button -->
      <button id="startLessonBtn" style="
        width:100%; background:#7c3aed; border:none; border-radius:14px;
        padding:16px; margin-top:20px; cursor:pointer;
        color:#fff; font-size:16px; font-weight:700;
      ">Start Lesson 1: What is Solana?</button>
    </div>
  </div>

  <!-- Dev tools panel -->
  <div style="
    position: fixed; top: 10px; right: 10px; z-index: 50;
    display: flex; flex-direction: column; gap: 8px;
  ">
    <!-- Light toggles -->
    <div id="lightPanel" class="dev-panel collapsed">
      <span class="dev-panel-header">Lights</span>
      <div class="dev-panel-body" id="lightPanelBody"></div>
    </div>

    <!-- Camera controls -->
    <div id="cameraPanel" class="dev-panel collapsed">
      <span class="dev-panel-header">Camera</span>
      <div class="dev-panel-body" id="cameraPanelBody"></div>
    </div>

    <!-- Gizmo controls -->
    <div id="gizmoPanel" class="dev-panel collapsed">
      <span class="dev-panel-header">Transform</span>
      <div class="dev-panel-body" id="gizmoPanelBody"></div>
    </div>

    <!-- Transform inputs -->
    <div id="transformPanel" class="dev-panel collapsed">
      <span class="dev-panel-header">Selected: <span id="selectedName" style="color: #7c3aed;">none</span></span>
      <div class="dev-panel-body" id="transformInputs"></div>
    </div>

    <!-- Path recording -->
    <div id="pathPanel" class="dev-panel collapsed">
      <span class="dev-panel-header">Path Recording</span>
      <div class="dev-panel-body" id="pathPanelBody"></div>
    </div>
  </div>

  <script>
    document.querySelectorAll('.dev-panel-header').forEach(h => {
      h.addEventListener('click', () => h.parentElement.classList.toggle('collapsed'));
    });
  </script>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
